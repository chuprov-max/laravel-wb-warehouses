version: '3.8'

services:
  app:
    build:
      context: ./php
    container_name: laravel-app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
    networks:
      - laravel-network
    dns:
      - 8.8.8.8
      - 1.1.1.1

  nginx:
    image: nginx:latest
    container_name: nginx-server
    volumes:
      - ./src:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - app
    networks:
      - laravel-network

  db:
    image: mysql:8.1
    container_name: mysql-database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: laravel
      PMA_PASSWORD: password
    depends_on:
      - db
    networks:
      - laravel-network

  node:
    image: node:20
    container_name: node-builder
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - laravel-network
    entrypoint: [ "tail", "-f", "/dev/null" ]

volumes:
  db_data:

networks:
  laravel-network:
    driver: bridge
